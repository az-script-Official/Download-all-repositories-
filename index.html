<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="أداة ويب لنسخ احتياطي مستودعات GitHub العامة عن طريق تحميلها كملفات ZIP">
    <meta name="author" content="Argh94">
    <meta name="theme-color" content="#0d1117">
    <meta name="robots" content="index, follow">
    <title>أداة نسخ احتياطي مستودعات GitHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%239ece6a' d='M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385c.6.105.825-.255.825-.57c0-.285-.015-1.23-.015-2.235c-3.015.555-3.795-.735-4.035-1.41c-.135-.345-.72-1.41-1.23-1.695c-.42-.225-1.02-.78-.015-.795c.945-.015 1.62.87 1.845 1.23c1.08 1.815 2.805 1.305 3.495.99c.105-.78.42-1.305.765-1.605c-2.67-.3-5.46-1.335-5.46-5.925c0-1.305.465-2.385 1.23-3.225c-.12-.3-.54-1.53.12-3.18c0 0 1.005-.315 3.3 1.23c.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23c.66 1.65.24 2.88.12 3.18c.765.84 1.23 1.905 1.23 3.225c0 4.605-2.805 5.625-5.475 5.925c.435.375.81 1.095.81 2.22c0 1.605-.015 2.895-.015 3.3c0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z'/%3E%3C/svg%3E">
</head>
<body class="dark-theme">
    <main class="terminal-container">
        <!-- الهيدر -->
        <header class="terminal-header">
            <button id="theme-toggle" class="glow-button icon-button" aria-label="تبديل المظهر">
                <i class="fas fa-moon button-icon"></i>
            </button>
            <h1 class="terminal-title">أداة نسخ احتياطي مستودعات GitHub</h1>
            <div style="width: 40px;"></div>
        </header>

        <!-- المحتوى -->
        <section class="terminal-content">
            <div class="fixed-content">
                <!-- قسم إضافة الحسابات -->
                <div class="terminal-section">
                    <h2 class="terminal-intro">أضف حسابات GitHub لتحميل مستودعاتها بالتتابع</h2>

                    <div class="accounts-list" id="accountsList">
                        <div class="account-entry" data-index="0">
                            <div class="input-wrapper">
                                <span class="user-avatar">
                                    <i class="fas fa-user input-icon" id="default-avatar-0"></i>
                                    <img src="" id="profile-avatar-0" class="profile-avatar" style="display:none;" alt="">
                                </span>
                                <input type="text" class="account-input subscription-input" placeholder="أدخل اسم مستخدم أو رابط حساب GitHub" data-index="0">
                            </div>
                            <button class="glow-button icon-button remove-account-btn" data-index="0" title="حذف الحساب" style="visibility:hidden;">
                                <i class="fas fa-times button-icon"></i>
                            </button>
                        </div>
                    </div>

                    <button id="add-account-btn" class="glow-button add-account-btn">
                        <i class="fas fa-plus-circle button-icon"></i>
                        <span>إضافة حساب</span>
                    </button>

                    <div class="button-group">
                        <button id="download-all-btn" class="glow-button primary">
                            <i class="fas fa-download button-icon"></i>
                            <span>بدء التحميل</span>
                        </button>
                        <button id="clear-btn" class="glow-button warning" style="display:none;">
                            <i class="fas fa-trash button-icon"></i>
                            <span>مسح الكل</span>
                        </button>
                    </div>
                </div>

                <!-- قسم التقدم -->
                <div id="progress-section" class="terminal-section progress-section" style="display:none;">
                    <div class="progress-header">
                        <h3><i class="fas fa-tasks"></i> تقدم التحميل</h3>
                        <span class="overall-progress" id="overallProgress">0 / 0</span>
                    </div>
                    <div class="overall-progress-bar">
                        <div class="overall-progress-fill" id="overallProgressFill" style="width:0%"></div>
                    </div>
                    <div id="accountProgressList" class="account-progress-list"></div>
                </div>

                <!-- قسم النتائج -->
                <div id="results-section" class="terminal-section results-section" style="display:none;">
                    <div id="results-header" class="results-header"></div>
                    <div id="results-list" class="results-list"></div>
                </div>

                <!-- رسالة خطأ -->
                <div id="error-container" class="terminal-error" style="display:none;"></div>
            </div>

            <!-- منطقة التمرير -->
            <div id="scrollArea" class="scrollable-content"></div>
        </section>

        <!-- الفوتر -->
        <footer class="terminal-footer">
            <span class="typing-animation"><a href="https://github.com/Argh94" target="_blank" rel="noopener">Argh94</a></span>
        </footer>
    </main>

    <noscript>
        <div class="terminal-error">هذا التطبيق يتطلب JavaScript للعمل. يرجى تفعيل JavaScript في إعدادات المتصفح.</div>
    </noscript>

    <script src="download.js"></script>
    <script src="script.js"></script>
</body>
</html>
